pre-commit:
  parallel: true
  commands:
    fmt-check:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm oxfmt --check {staged_files}

    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm oxlint {staged_files} --tsconfig tsconfig.json

    type-check:
      glob: "*.{ts,tsx}"
      run: pnpm tsc --noEmit
